{% extends 'tasks/base.html' %}

{% block content %}
<div class="row">
    <div class="col-md-6 mx-auto">
        <h2 style="font-weight: 700; letter-spacing: -0.5px; margin-left: 10px;">Today</h2>
        
        <div class="apple-card">
            <ul class="list-group list-group-flush">
                
                {% for task in tasks %}
                    <li class="list-group-item d-flex justify-content-between align-items-center" style="padding: 16px 20px; border-bottom: 1px solid rgba(0,0,0,0.05);">
                        <div>
                            <h6 style="margin: 0; font-weight: 500; font-size: 16px;">{{ task.title }}</h6>
                            {% if task.description %}
                                <small style="color: var(--apple-text-muted); font-size: 13px;">{{ task.description }}</small>
                            {% endif %}
                        </div>
                        
                        <form method="POST" action="{% url 'complete_task' task.id %}" style="margin: 0;">
    {% csrf_token %}
    <button type="submit" class="btn btn-sm" style="background-color: var(--apple-bg); color: var(--apple-blue); border-radius: 20px; font-weight: 600; padding: 4px 12px; border: none;">
        Done
    </button>
</form>
                    </li>
                {% empty %}
                    <li class="list-group-item text-center" style="padding: 30px; color: var(--apple-text-muted); border: none;">
                        No tasks scheduled. Enjoy your day!
                    </li>
                {% endfor %}

            </ul>
        </div>
        
    </div>
</div>
{% endblock %}
