<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assistant</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Apple Color Palette & Typography */
        :root {
            --apple-bg: #F5F5F7;
            --apple-card: #FFFFFF;
            --apple-blue: #007AFF;
            --apple-text: #1D1D1F;
            --apple-text-muted: #86868B;
        }
        
        body {
            background-color: var(--apple-bg);
            color: var(--apple-text);
            /* This forces Apple devices to use their native San Francisco font */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        /* The Glassmorphism Navbar */
        .navbar {
            background: rgba(255, 255, 255, 0.7) !important;
            backdrop-filter: saturate(180%) blur(20px);
            -webkit-backdrop-filter: saturate(180%) blur(20px); /* For Safari */
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
            padding: 15px 0;
        }
        
        .navbar-brand {
            font-weight: 600;
            color: var(--apple-text) !important;
            letter-spacing: -0.5px;
        }

        .nav-link {
            color: var(--apple-text-muted) !important;
            font-weight: 500;
            transition: color 0.2s ease;
        }

        .nav-link:hover, .nav-link.active {
            color: var(--apple-blue) !important;
        }

        /* Apple Style Cards */
        .apple-card {
            background-color: var(--apple-card);
            border-radius: 18px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.04);
            border: none;
            overflow: hidden;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg sticky-top">
        <div class="container">
            <a class="navbar-brand" href="/">Assistant</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" style="border: none;">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link active" href="/">Daily Tasks</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Planned Tasks</a></li>
                    <li class="nav-item"><a class="nav-link" href="/finance/">Expenses</a></li>
</li>
                    <li class="nav-item"><a class="nav-link" href="/university/">University</a></li>
</li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        {% block content %}
        {% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
